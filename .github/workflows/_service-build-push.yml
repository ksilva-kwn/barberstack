# =============================================================================
# Workflow REUTILIZÁVEL — build, push ECR e deploy EC2
# Chamado por cada pipeline de microserviço via `workflow_call`
# Todos os secrets de runtime ficam no SSM Parameter Store.
# GitHub Secrets necessários: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#                             AWS_REGION, EC2_HOST, EC2_SSH_KEY
# =============================================================================
name: _service-build-push (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: "Ex: api-gateway, auth-service"
      service_port:
        required: true
        type: number
        description: "Porta do serviço dentro do container"
      run_migrations:
        required: false
        type: boolean
        default: false
        description: "Rodar prisma migrate deploy antes de subir o container"
    secrets:
      AWS_ACCESS_KEY_ID:     { required: true }
      AWS_SECRET_ACCESS_KEY: { required: true }
      AWS_REGION:            { required: true }
      EC2_HOST:              { required: true }
      EC2_SSH_KEY:           { required: true }

jobs:
  build-push:
    name: Build & Push — ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names barberstack-${{ inputs.service_name }} \
            --region ${{ secrets.AWS_REGION }} \
          || aws ecr create-repository \
            --repository-name barberstack-${{ inputs.service_name }} \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ secrets.AWS_REGION }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/barberstack-${{ inputs.service_name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ inputs.service_name }}/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.service_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service_name }}

  deploy:
    name: Deploy — ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy service via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
            SERVICE="${{ inputs.service_name }}"
            IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"

            # Garante que a rede existe
            docker network inspect barberstack-network >/dev/null 2>&1 \
              || docker network create barberstack-network

            # Login ECR no EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Migrations (apenas quando run_migrations=true)
            if [ "${{ inputs.run_migrations }}" = "true" ]; then
              echo "▶ Rodando migrations..."
              docker run --rm \
                --network barberstack-network \
                --env-file /opt/barberstack/.env \
                "$ECR_REGISTRY/barberstack-$SERVICE:$IMAGE_TAG" \
                npx prisma migrate deploy --schema /app/packages/database/prisma/schema.prisma
              echo "✅ Migrations concluídas"
            fi

            # Pull e reinicia apenas este serviço
            docker pull "$ECR_REGISTRY/barberstack-$SERVICE:$IMAGE_TAG"
            docker stop "barberstack-$SERVICE" 2>/dev/null || true
            docker rm   "barberstack-$SERVICE" 2>/dev/null || true
            docker run -d \
              --name "barberstack-$SERVICE" \
              --network barberstack-network \
              --restart unless-stopped \
              --env-file /opt/barberstack/.env \
              -p ${{ inputs.service_port }}:${{ inputs.service_port }} \
              "$ECR_REGISTRY/barberstack-$SERVICE:$IMAGE_TAG"

            echo "✅ $SERVICE deployed: $IMAGE_TAG"
