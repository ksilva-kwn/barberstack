name: Service — subscription-service

on:
  push:
    branches: [main]
    paths:
      - 'services/subscription-service/**'
      - 'packages/database/**'
      - 'Dockerfile.service'
      - '.github/workflows/_service-build-push.yml'
      - '.github/workflows/svc-subscription-service.yml'
  pull_request:
    branches: [main]
    paths: ['services/subscription-service/**']
  workflow_dispatch:

jobs:
  build-deploy:
    uses: ./.github/workflows/_service-build-push.yml
    with:
      service_name: subscription-service
      service_port: 3004
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}
      EC2_HOST:              ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY:           ${{ secrets.EC2_SSH_KEY }}
