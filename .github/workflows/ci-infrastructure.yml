name: Infrastructure — Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/ci-infrastructure.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
  workflow_dispatch:

env:
  TF_VERSION:     '1.7.5'
  TF_WORKING_DIR: infrastructure/terraform

  # Apenas credenciais AWS — tudo mais é derivado automaticamente
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}

  TF_VAR_github_repo: ${{ github.server_url }}/${{ github.repository }}

defaults:
  run:
    working-directory: infrastructure/terraform

jobs:
  setup:
    name: Setup Backend (S3 + DynamoDB)
    runs-on: ubuntu-latest

    outputs:
      bucket: ${{ steps.backend.outputs.bucket }}
      dynamodb_table: ${{ steps.backend.outputs.dynamodb_table }}

    steps:
      - name: Derive backend names from AWS Account ID
        id: backend
        working-directory: .
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="barberstack-tfstate-${ACCOUNT_ID}"
          TABLE="barberstack-terraform-locks"

          echo "bucket=$BUCKET"         >> $GITHUB_OUTPUT
          echo "dynamodb_table=$TABLE"  >> $GITHUB_OUTPUT
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

          echo "✅ Bucket: $BUCKET"
          echo "✅ Table:  $TABLE"

      - name: Ensure S3 bucket exists
        working-directory: .
        run: |
          BUCKET="${{ steps.backend.outputs.bucket }}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET já existe"
          else
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$AWS_DEFAULT_REGION"
            echo "Bucket $BUCKET criado"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$BUCKET" \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

      - name: Ensure DynamoDB table exists
        working-directory: .
        run: |
          TABLE="${{ steps.backend.outputs.dynamodb_table }}"

          if aws dynamodb describe-table --table-name "$TABLE" 2>/dev/null; then
            echo "Tabela $TABLE já existe"
          else
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST

            aws dynamodb wait table-exists --table-name "$TABLE"
            echo "Tabela $TABLE criada"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # PLAN — em PRs
  # ─────────────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.setup.outputs.bucket }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=$AWS_DEFAULT_REGION" \
            -backend-config="dynamodb_table=${{ needs.setup.outputs.dynamodb_table }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8').slice(-50000);
            const outcome = '${{ steps.plan.outcome }}';
            const icon = outcome === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### ${icon} Terraform Plan \`${outcome}\`\n<details><summary>Detalhes</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n</details>`
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────
  # APPLY — push para main
  # ─────────────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.setup.outputs.bucket }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=$AWS_DEFAULT_REGION" \
            -backend-config="dynamodb_table=${{ needs.setup.outputs.dynamodb_table }}" \
            -backend-config="encrypt=true"

      - name: Remove orphaned RDS subnet group from state
        run: terraform state rm module.rds.aws_db_subnet_group.main || true

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Show outputs
        run: |
          echo "## Infra Outputs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
