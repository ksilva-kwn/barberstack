version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - NODE_ENV=development pnpm install --no-frozen-lockfile
    build:
      commands:
        - cd frontend/web && pnpm run build
        - cp -r frontend/web/public frontend/web/.next/standalone/public
        - cp -r frontend/web/.next/static frontend/web/.next/standalone/.next/static
  artifacts:
    baseDirectory: frontend/web/.next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - frontend/web/.next/cache/**/*
