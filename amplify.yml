version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - NODE_ENV=development pnpm install --no-frozen-lockfile
    build:
      commands:
        - pnpm --filter @barberstack/web build
  artifacts:
    baseDirectory: frontend/web/out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - frontend/web/.next/cache/**/*
