version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - pnpm --filter @barberstack/web build
  artifacts:
    baseDirectory: frontend/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - frontend/web/.next/cache/**/*
