version: 1
applications:
  - appRoot: frontend/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            # Instala a partir da raiz do monorepo (appRoot = frontend/web, sobe 2 níveis)
            - cd ../.. && NODE_ENV=development pnpm install --no-frozen-lockfile
        build:
          commands:
            # Roda de dentro de frontend/web (appRoot) — next build gera .next aqui
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
