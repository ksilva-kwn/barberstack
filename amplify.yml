version: 1
applications:
  - appRoot: frontend/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - cd ../.. && NODE_ENV=development pnpm install --no-frozen-lockfile && cd frontend/web
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
